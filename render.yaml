services:
  - type: web
    name: genesis-indexa-360-ia
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DB_PATH
        value: /opt/render/project/src/data
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SERPER_API_KEY
        sync: false
      - key: GOOGLE_SEARCH_KEY
        sync: false
      - key: GOOGLE_SEARCH_CX
        sync: false
      - key: BLING_API_KEY
        sync: false
      - key: BLING_CLIENT_ID
        sync: false
      - key: BLING_CLIENT_SECRET
        sync: false
      - key: WIX_API_KEY
        sync: false
      - key: WIX_SITE_ID
        sync: false
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
