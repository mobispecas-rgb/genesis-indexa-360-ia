services:
  - type: web
    name: genesis-indexa-360-ia
    env: node
    plan: starter
    buildCommand: npm install && cd web && npm install && npm run build && cd ..
    startCommand: node server.js
    envVars:
      - key: DB_PATH
        value: /opt/render/project/src/data
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SERPER_API_KEY
        sync: false
      - key: GOOGLE_SEARCH_KEY
        sync: false
      - key: GOOGLE_SEARCH_CX
        sync: false
      - key: BLING_API_KEY
        sync: false
      - key: BLING_CLIENT_ID
        sync: false
      - key: BLING_CLIENT_SECRET
        sync: false
      - key: WIX_API_KEY
        sync: false
      - key: WIX_SITE_ID
        sync: false
      - key: MCP_AUTH_TOKEN
        sync: false
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
