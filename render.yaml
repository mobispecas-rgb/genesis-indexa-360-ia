services:
  - type: web
    name: indexaai-catalog-pro
    runtime: node
    plan: starter
    buildCommand: npm install --production
    startCommand: npm start
    healthCheckPath: /api/health
    disk:
      name: indexaai-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: APP_URL
        fromService:
          type: web
          name: indexaai-catalog-pro
          property: host
      - fromGroup: genesis-irollo-360
