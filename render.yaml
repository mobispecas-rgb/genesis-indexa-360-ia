services:
  - type: web
    name: indexaai-catalog-pro
    runtime: node
    plan: free
    buildCommand: npm install --production
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: APP_URL
        fromService:
          type: web
          name: indexaai-catalog-pro
          property: host
      - fromGroup: genesis-irollo-360
