name: CI — Genesis Indexa 360 IA

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Syntax & Startup Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --production

      - name: Syntax check server.js
        run: node --check server.js

      - name: Health check (startup test)
        run: |
          node server.js &
          SERVER_PID=$!
          sleep 4
          STATUS=$(curl -sf http://localhost:10000/api/health | node -e "process.stdin.resume();let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{console.log(JSON.parse(d).status)}catch(e){console.log('ERROR')}})")
          kill $SERVER_PID 2>/dev/null || true
          if [ "$STATUS" = "OK" ]; then
            echo "Health check passed: $STATUS"
          else
            echo "Health check failed: $STATUS"
            exit 1
          fi
        env:
          PORT: 10000
          NODE_ENV: development
