<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iRollo 360 — Motor NTC 4.0</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0a0a0a;color:#fff;display:flex;height:100vh;overflow:hidden}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#111}::-webkit-scrollbar-thumb{background:#333;border-radius:3px}

/* SIDEBAR */
#sidebar{width:220px;min-width:220px;background:#111111;height:100vh;display:flex;flex-direction:column;border-right:1px solid #1f1f1f;position:fixed;left:0;top:0;z-index:100;overflow-y:auto;transition:transform .3s}
#sidebar.hidden{transform:translateX(-220px)}
.sb-logo{padding:16px 14px;border-bottom:1px solid #1f1f1f;display:flex;align-items:center;gap:10px}
.sb-logo .logo-icon{width:32px;height:32px;background:linear-gradient(135deg,#ff4500,#ff6b00);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.sb-logo .logo-text{font-size:12px;font-weight:700;color:#fff;line-height:1.2}
.sb-logo .logo-sub{font-size:10px;color:#888}
.sb-section{padding:12px 0 4px 0}
.sb-section-label{font-size:9px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:1.5px;padding:0 14px 6px}
.sb-item{display:flex;align-items:center;gap:9px;padding:7px 14px;cursor:pointer;font-size:12.5px;color:#aaa;border-left:3px solid transparent;transition:all .15s;position:relative;white-space:nowrap}
.sb-item:hover{color:#ddd;background:#ffffff08}
.sb-item.active{border-left:3px solid #ff4500;background:#ff450010;color:#ff4500}
.sb-item .icon{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.sb-badge{margin-left:auto;background:#ff4500;color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px}
.sb-footer{margin-top:auto;padding:12px 14px;border-top:1px solid #1f1f1f;font-size:10px;color:#555;line-height:1.4}

/* MAIN */
#main{margin-left:220px;flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;transition:margin-left .3s}
#topbar{background:#111;border-bottom:1px solid #1f1f1f;padding:10px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0}
#hamburger{background:none;border:none;color:#aaa;font-size:20px;cursor:pointer;display:none;padding:4px}
.health-dot{width:8px;height:8px;background:#00ff88;border-radius:50%;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 #00ff8855}50%{box-shadow:0 0 0 5px #00ff8800}}
.health-text{font-size:12px;color:#888}
.health-text span{color:#00ff88}
.topbar-right{margin-left:auto;font-size:11px;color:#555}
#content{flex:1;overflow-y:auto;padding:24px}
.page{display:none}
.page.active{display:block}

/* CARDS / COMMON */
.page-title{font-size:20px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.card{background:#161616;border:1px solid #1f1f1f;border-radius:10px;padding:18px;margin-bottom:16px}
.card-title{font-size:13px;font-weight:600;color:#ccc;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.stat-card{background:#161616;border:1px solid #1f1f1f;border-radius:10px;padding:18px;text-align:center}
.stat-num{font-size:32px;font-weight:800;color:#ff4500}
.stat-label{font-size:12px;color:#888;margin-top:4px}
.btn{padding:8px 16px;border-radius:7px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s}
.btn-primary{background:#ff4500;color:#fff}
.btn-primary:hover{background:#ff6b00}
.btn-secondary{background:#1f1f1f;color:#aaa;border:1px solid #333}
.btn-secondary:hover{color:#fff;border-color:#555}
.btn-sm{padding:5px 10px;font-size:11px}
.badge{display:inline-block;padding:3px 8px;border-radius:5px;font-size:10px;font-weight:700}
.badge-green{background:#00ff8820;color:#00ff88;border:1px solid #00ff8840}
.badge-orange{background:#ffaa0020;color:#ffaa00;border:1px solid #ffaa0040}
.badge-red{background:#ff450020;color:#ff6500;border:1px solid #ff450040}
input,select,textarea{background:#0d0d0d;border:1px solid #2a2a2a;color:#fff;border-radius:7px;padding:9px 12px;font-size:13px;width:100%;outline:none;transition:border .15s;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:#ff4500}
select option{background:#0d0d0d}
label{font-size:12px;color:#888;display:block;margin-bottom:5px}
.form-group{margin-bottom:14px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 12px;color:#666;font-size:11px;font-weight:600;border-bottom:1px solid #1f1f1f;text-transform:uppercase;letter-spacing:.5px}
td{padding:9px 12px;border-bottom:1px solid #111;color:#ccc}
tr:hover td{background:#ffffff04}
.stub-page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;color:#555;gap:16px}
.stub-page .stub-icon{font-size:48px;opacity:.4}
.stub-page h2{font-size:18px;font-weight:600;color:#444}

/* NTC / IA */
.ntc-big{font-size:72px;font-weight:900;line-height:1;margin-bottom:4px}
.ntc-aprovado{color:#00ff88}
.ntc-pendente{color:#ffaa00}
.ntc-reprovado{color:#ff6500}
/* APPROVAL TABLES */
.aprov-plat-tab{background:none;border:1px solid #333;border-radius:20px;padding:4px 14px;font-size:12px;color:#888;cursor:pointer;white-space:nowrap;transition:all .15s;display:inline-block}
.aprov-plat-tab.active{background:#ff450020;border-color:#ff4500;color:#ff4500;font-weight:600}
.aprov-plat-tab:hover{border-color:#555;color:#ccc}
.aprov-table{width:100%;border-collapse:collapse;font-size:13px}
.aprov-table th{text-align:left;padding:10px 8px;color:#555;font-weight:600;border-bottom:2px solid #222;white-space:nowrap;font-size:12px}
.aprov-table td{padding:9px 8px;border-bottom:1px solid #1a1a1a;vertical-align:middle}
.aprov-table tr:hover td{background:#ffffff04}
.aprov-sort-item{padding:8px 14px;font-size:13px;color:#aaa;cursor:pointer;border-radius:5px;white-space:nowrap;display:block}
.aprov-sort-item:hover{background:#ff450015;color:#ff4500}
.aprov-dd-wrap{position:relative;display:inline-block}
.aprov-dd-menu{display:none;position:absolute;top:calc(100% + 4px);left:0;background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:4px 0;z-index:200;min-width:230px;box-shadow:0 8px 32px #00000099}
.aprov-dd-menu.open{display:block}
.aprov-plat-tab-e{background:none;border:1px solid #333;border-radius:20px;padding:4px 14px;font-size:12px;color:#888;cursor:pointer;white-space:nowrap;transition:all .15s;display:inline-block}
.aprov-plat-tab-e.active{background:#ff450020;border-color:#ff4500;color:#ff4500;font-weight:600}
.aprov-plat-tab-e:hover{border-color:#555;color:#ccc}
.module-bar-wrap{height:6px;background:#1f1f1f;border-radius:3px;margin-top:6px;overflow:hidden}
.module-bar{height:100%;border-radius:3px;transition:width .5s}
.module-card{background:#0d0d0d;border:1px solid #1f1f1f;border-radius:8px;padding:12px;margin-bottom:8px}
.module-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.module-name{font-size:12px;font-weight:700;color:#ccc}
.module-score{font-size:11px;color:#888}
.module-items{font-size:11px;color:#666;margin-top:6px;line-height:1.8}
.check-ok{color:#00ff88}
.check-no{color:#ff6500}
.dna-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px}
.dna-item{background:#0d0d0d;border:1px solid #1f1f1f;border-radius:6px;padding:8px}
.dna-key{color:#666;font-size:10px;text-transform:uppercase;letter-spacing:.5px}
.dna-val{color:#fff;font-weight:600;margin-top:2px;word-break:break-all}
.rast-line{font-family:monospace;font-size:11px;color:#888;background:#0d0d0d;border:1px solid #1f1f1f;border-radius:5px;padding:6px 10px;margin:10px 0}

/* IMAGENS (light page) */
#page-imagens{background:#ffffff;color:#1a1a1a}
#page-imagens .page-title{color:#1a1a1a}
#page-imagens .card{background:#f8f8f8;border-color:#e0e0e0}
#page-imagens .card-title{color:#333}
#page-imagens input,#page-imagens select,#page-imagens textarea{background:#fff;border-color:#ccc;color:#1a1a1a}
#page-imagens input:focus,#page-imagens select:focus{border-color:#ff4500}
#page-imagens select option{background:#fff;color:#1a1a1a}
#page-imagens label{color:#555}
#page-imagens .btn-secondary{background:#f0f0f0;color:#333;border-color:#ccc}
#page-imagens .btn-secondary:hover{color:#000}
.tabs{display:flex;gap:2px;border-bottom:1px solid #2a2a2a;margin-bottom:20px}
.tab{padding:9px 16px;cursor:pointer;font-size:13px;color:#888;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab:hover{color:#ccc}
.tab.active{color:#ff4500;border-bottom-color:#ff4500}
.tab-content{display:none}.tab-content.active{display:block}
.img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.img-card{background:#f0f0f0;border:1px solid #e0e0e0;border-radius:8px;overflow:hidden;position:relative}
.img-card img{width:100%;height:120px;object-fit:cover;display:block}
.img-card-info{padding:8px;font-size:11px;color:#555}
.img-card-ref{font-weight:600;color:#222;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.drag-area{border:2px dashed #ff4500;border-radius:10px;padding:40px;text-align:center;cursor:pointer;transition:background .15s;color:#888;background:#fff8f5}
.drag-area:hover,.drag-area.drag-over{background:#fff0ea}
.drag-icon{font-size:36px;margin-bottom:10px}
.search-bar-light{display:flex;gap:8px;margin-bottom:16px}
.search-bar-light input{flex:1;background:#fff;border:1px solid #ccc;color:#1a1a1a;border-radius:7px;padding:9px 12px}
.search-bar-light select{width:140px;background:#fff;border:1px solid #ccc;color:#1a1a1a;border-radius:7px;padding:9px 12px}
.img-result-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-top:16px}
.img-result-card{background:#f8f8f8;border:1px solid #e0e0e0;border-radius:8px;overflow:hidden;cursor:pointer;transition:box-shadow .15s}
.img-result-card:hover{box-shadow:0 4px 12px #0002}
.img-result-card img{width:100%;height:130px;object-fit:cover}
.img-result-info{padding:8px;font-size:11px;color:#666}
.msg-info{padding:12px;background:#fff8f5;border:1px solid #ff450030;border-radius:7px;color:#cc4400;font-size:12px;margin-top:12px}

/* QUICK ACTIONS */
.qa-btn{display:flex;align-items:center;gap:10px;padding:12px 16px;background:#161616;border:1px solid #1f1f1f;border-radius:8px;cursor:pointer;transition:all .15s;color:#ccc;font-size:13px}
.qa-btn:hover{border-color:#ff4500;color:#ff4500;background:#ff450008}

/* RESPONSIVE */
@media(max-width:768px){
  #hamburger{display:block}
  #sidebar{transform:translateX(-220px)}
  #sidebar.open{transform:translateX(0)}
  #main{margin-left:0}
  .grid4{grid-template-columns:1fr 1fr}
  .grid3{grid-template-columns:1fr}
  .grid2{grid-template-columns:1fr}
  #content{padding:12px}
  .card{padding:12px}
  .page-title{font-size:16px}
  .stat-num{font-size:24px}
  .btn{padding:10px 14px;font-size:14px}
  input,select,textarea{font-size:15px;padding:10px 12px}
  #img-slots-grid{grid-template-columns:repeat(2,1fr)!important}
  #img-google-grid{grid-template-columns:repeat(2,1fr)!important}
  .tabs{overflow-x:auto;white-space:nowrap}
  .tab{display:inline-block;padding:8px 12px;font-size:12px}
  #topbar{padding:8px 12px;gap:8px}
  .sb-item{padding:9px 14px;font-size:13px}
  .img-cat-btn{padding:6px 12px!important;font-size:12px!important}
}
@media(max-width:480px){
  #img-slots-grid{grid-template-columns:1fr 1fr!important}
  .grid4{grid-template-columns:1fr}
  .stat-card{padding:12px}
  .stat-num{font-size:20px}
  .qa-btn{padding:10px 12px;font-size:12px}
  #img-cat-bar{gap:4px}
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<nav id="sidebar">
  <div class="sb-logo">
    <div class="logo-icon">&#9889;</div>
    <div>
      <div class="logo-text">iRollo 360</div>
      <div class="logo-sub">Motor NTC 4.0 &bull; iRollo</div>
    </div>
  </div>

  <div class="sb-section">
    <div class="sb-section-label">Principal</div>
    <div class="sb-item active" onclick="nav('dashboard')"><span class="icon">&#128202;</span>Dashboard</div>
    <div class="sb-item" onclick="nav('produtos')"><span class="icon">&#128230;</span>Produtos</div>
  </div>
